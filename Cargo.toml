[package]
name = "oy"
version = "0.1.0"
edition = "2024"
description = "Rust rewrite of the oy coding CLI"
license = "Apache-2.0"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["clock", "serde"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
genai = "0.5.3"
glob = "0.3"
globset = "0.4"
grep-regex = "0.1"
grep-searcher = "0.1"
html2md = "0.2"
ignore = "0.4"
reedline = "0.47"
regex = "1.11"
bzip2 = "0.5"
flate2 = "1.1"
isahc = { version = "1.8", features = ["json"] }
tar = "0.4"
tree-sitter = "0.26"
tree-sitter-javascript = "0.25"
tree-sitter-python = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-typescript = "0.23"
xz2 = "0.1"
zip = { version = "2.2", default-features = false, features = ["deflate"] }
zstd = "0.13"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strsim = "0.11"
tokei = "14.0"
tiktoken-rs = "0.11"
tokio = { version = "1.48", features = ["full"] }
toml = "0.8"
toon-format = { version = "0.4.5", default-features = false }
url = "2.5"

[dev-dependencies]
tempfile = "3.14"
