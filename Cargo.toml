[package]
name = "oy"
version = "0.7.2"
edition = "2024"
rust-version = "1.85"
description = "Rust rewrite of the oy coding CLI"
license = "Apache-2.0"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["clock", "serde"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
genai = "0.5.3"
glob = "0.3"
globset = "0.4"
grep-regex = "0.1"
grep-searcher = "0.1"
html2md = "0.2"
ignore = "0.4"
reedline-repl-rs = { version = "1.3", features = ["async", "shlex"] }
regex = "1.11"
flate2 = "1.1"
tar = "0.4"
zip = { version = "2.2", default-features = false, features = ["deflate"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
syntect = "5.2"
tiktoken-rs = "0.11"
tokei = "14.0"
reqwest = { version = "0.13", default-features = false, features = ["rustls", "http2", "json"] }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "process", "time", "net"] }
toml = "0.8"
toon-format = { version = "0.4.5", default-features = false }
url = "2.5"

[dev-dependencies]
tempfile = "3.14"
