[book]
authors = ["oy contributors"]
description = "A focused OpenCode agent with repeatable audits, code reviews, and one-finding fixes"
language = "en"
src = "docs"
title = "oy documentation"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
edit-url-template = "https://github.com/adonm/oy-cli/edit/main/{path}"
git-repository-url = "https://github.com/adonm/oy-cli"
preferred-dark-theme = "navy"
site-url = "/"

[output.html.search]
enable = true
limit-results = 20
