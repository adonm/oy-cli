name: Release Go binary

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        shell: bash
        run: |
          VERSION=dev
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          go build -ldflags "-X github.com/wagov-dtt/oy-cli/internal/oy/version.Version=${VERSION}" -o dist/oy ./cmd/oy
      - name: Verify version
        run: ./dist/oy --version
      - uses: actions/upload-artifact@v4
        with:
          name: oy-linux-amd64
          path: dist/oy
