name: Release Go binary

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o dist/oy ./cmd/oy
      - uses: actions/upload-artifact@v4
        with:
          name: oy-linux-amd64
          path: dist/oy
