name: Rust CI and Release

on:
  push:
    branches: [rust]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/rust')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/oy dist/oy
          tar -C dist -czf oy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz oy
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oy-${{ github.ref_name }}-${{ matrix.target }}
          path: oy-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Create draft GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --draft \
            --target "${{ github.sha }}" \
            --title "${{ github.ref_name }}" \
            --notes "Rust release ${{ github.ref_name }}."
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
